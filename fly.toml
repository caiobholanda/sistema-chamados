# fly.toml — configuração Fly.io para sistema-chamados
app = "sistema-chamados-granmarquise"
primary_region = "gru"

[build]

[env]
  PORT = "3000"
  NODE_ENV = "production"

[[mounts]]
  source = "data"
  destination = "/app/data"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
