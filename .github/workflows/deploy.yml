name: Deploy to Railway

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Railway deploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          curl -s -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "query": "mutation { environmentTriggersDeploy(input: { projectId: \"46c9a99e-7824-4c7f-8c15-886f825a461e\", environmentId: \"5a1be2d0-373d-4a3f-8c3b-e27f169b596b\", serviceId: \"2acb4524-0b02-4dc9-918c-d6f0b5ebbae2\" }) }"
            }' | tee /tmp/deploy_response.json

          RESULT=$(cat /tmp/deploy_response.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('data',{}).get('environmentTriggersDeploy','false'))")
          echo "Deploy triggered: $RESULT"

          if [ "$RESULT" != "true" ]; then
            echo "Deploy trigger failed"
            cat /tmp/deploy_response.json
            exit 1
          fi

      - name: Wait for deployment to complete
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "Aguardando build e deploy..."
          sleep 30

          for i in $(seq 1 12); do
            STATUS=$(curl -s -X POST https://backboard.railway.app/graphql/v2 \
              -H "Authorization: Bearer $RAILWAY_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{
                "query": "{ deployments(input: { serviceId: \"2acb4524-0b02-4dc9-918c-d6f0b5ebbae2\", environmentId: \"5a1be2d0-373d-4a3f-8c3b-e27f169b596b\" }) { edges { node { id status } } } }"
              }' | python3 -c "import sys,json; d=json.load(sys.stdin); edges=d['data']['deployments']['edges']; print(edges[0]['node']['status'] if edges else 'UNKNOWN')" 2>/dev/null)

            echo "[$i/12] Status: $STATUS"

            if [ "$STATUS" = "SUCCESS" ]; then
              echo "Deploy realizado com sucesso!"
              exit 0
            elif [ "$STATUS" = "FAILED" ] || [ "$STATUS" = "CRASHED" ]; then
              echo "Deploy falhou com status: $STATUS"
              exit 1
            fi

            sleep 20
          done

          echo "Timeout: deploy ainda em andamento, verifique o Railway"
          exit 1
