<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Setores — Gran Marquise TI</title>
  <link rel="preconnect" href="https://letsimage.s3.amazonaws.com">
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .st-grid { display: flex; flex-direction: column; gap: .4rem; }
    .st-card {
      display: flex; align-items: center; gap: 0;
      border: 1px solid var(--border); border-radius: 8px;
      overflow: hidden; transition: box-shadow .15s, border-color .15s;
      background: var(--surface);
    }
    .st-card:hover { border-color: var(--border-focus, #94a3b8); box-shadow: 0 2px 8px rgba(0,0,0,.07); }
    .st-card-body { flex: 1; min-width: 0; padding: .6rem .9rem; }
    .st-card-nome { font-weight: 600; font-size: .88rem; color: var(--text); }
    .st-card-actions { display: flex; align-items: center; gap: .3rem; padding: .5rem .75rem; flex-shrink: 0; }
    .empty-state { padding: 2.5rem 1rem; text-align: center; color: var(--text-muted); font-size: .9rem; }
    .toast-notif.toast-sucesso { border-left-color: #10B981; }
    .toast-notif.toast-erro    { border-left-color: #EF4444; }
  </style>
</head>
<body>
<header>
  <div class="header-brand">
    <img class="header-logo-img" src="https://letsimage.s3.amazonaws.com/editor/granmarquise/imgs/1760033174793-hotelgranmarquise_pos_footer.png" alt="Gran Marquise">
    <div class="header-brand-text">
      <div class="header-brand-name">Gran Marquise</div>
      <div class="header-brand-sub">Suporte de TI</div>
    </div>
  </div>
  <div class="header-divider"></div>
  <nav></nav>
</header>

<div id="toast-container"></div>

<main class="wide">
  <div class="page-header flex-between flex-wrap gap-2">
    <div>
      <div class="page-title">Setores</div>
      <div class="page-subtitle">Gerencie os setores disponíveis para seleção em chamados e cadastros de usuários</div>
    </div>
    <button class="btn btn-primary" id="btn-novo-setor">+ Informar novo setor</button>
  </div>

  <div style="margin-bottom:1rem">
    <input class="form-control" type="search" id="filtro-setores"
      placeholder="Filtrar por nome…" style="max-width:360px">
  </div>

  <div id="lista-setores"><div class="loading"><div class="spinner"></div></div></div>
</main>

<!-- Modal Setor -->
<div class="modal-overlay" id="modal-setor-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-setor-title">
  <div class="modal" style="max-width:440px">
    <div class="modal-header">
      <h2 id="modal-setor-title">Informar novo setor</h2>
      <button class="modal-close" id="btn-fechar-setor" aria-label="Fechar">&#x2715;</button>
    </div>
    <div class="modal-body" style="padding:1.5rem">
      <form id="form-setor" novalidate>
        <input type="hidden" id="st-id">
        <div class="form-group" style="margin-bottom:0">
          <label for="st-nome">Nome do setor <span class="req">*</span></label>
          <input class="form-control" type="text" id="st-nome" maxlength="80" placeholder="Ex: Recepção, Financeiro, TI…" required>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button type="button" class="btn btn-secondary" id="btn-cancelar-setor">Cancelar</button>
      <button type="button" class="btn btn-primary" id="btn-salvar-setor">Salvar</button>
    </div>
  </div>
</div>

<!-- Confirm delete -->
<div class="modal-overlay" id="modal-confirm-setor-overlay" role="dialog" aria-modal="true">
  <div class="modal" style="max-width:360px">
    <div class="modal-header">
      <h2>Confirmar exclusão</h2>
      <button class="modal-close" id="btn-fechar-confirm-setor">&#x2715;</button>
    </div>
    <div class="modal-body" style="padding:1.5rem">
      <p id="confirm-setor-msg" style="margin:0;font-size:.92rem"></p>
    </div>
    <div class="modal-footer">
      <button type="button" class="btn btn-secondary" id="btn-cancelar-confirm-setor">Cancelar</button>
      <button type="button" class="btn btn-danger" id="btn-ok-confirm-setor">Excluir</button>
    </div>
  </div>
</div>

<script defer src="/js/nav.js"></script>
<script defer src="/js/fumaca.js"></script>
<script defer src="/js/admin-setores.js"></script>
</body>
</html>
