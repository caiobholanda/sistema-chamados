<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventário — Gran Marquise TI</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    /* ── Navegação por categorias ─────────────────────── */
    .cat-bar {
      display: flex;
      gap: .55rem;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: .1rem;
    }
    .cat-btn {
      display: inline-flex;
      align-items: center;
      gap: .42rem;
      padding: .48rem .95rem;
      border-radius: var(--radius);
      border: 1.5px solid var(--border);
      background: var(--surface);
      color: var(--text-muted);
      font-family: inherit;
      font-size: .78rem;
      font-weight: 600;
      cursor: pointer;
      transition: border-color .2s cubic-bezier(.25,.46,.45,.94),
                  color .2s cubic-bezier(.25,.46,.45,.94),
                  background .2s cubic-bezier(.25,.46,.45,.94),
                  box-shadow .2s cubic-bezier(.25,.46,.45,.94),
                  transform .2s cubic-bezier(.25,.46,.45,.94);
      letter-spacing: .025em;
    }
    .cat-btn svg { opacity: .65; flex-shrink: 0; transition: opacity .18s; }
    .cat-btn:hover {
      border-color: var(--gold);
      color: var(--text);
      transform: translateY(-1px);
      box-shadow: 0 3px 8px rgba(0,0,0,.08);
    }
    .cat-btn:hover svg { opacity: .9; }
    .cat-btn:active { transform: translateY(0); }
    .cat-btn.ativo {
      background: var(--gold);
      border-color: var(--gold);
      color: #F5EFE2;
      box-shadow: 0 2px 8px rgba(156,88,67,.3);
    }
    .cat-btn.ativo svg { opacity: 1; }
    .cat-btn.ativo .tab-badge { background: rgba(32,44,40,.18); color: #F5EFE2; }
    .cat-btn:not(.ativo) .tab-badge { background: var(--border); color: var(--text-secondary); }

    /* ── Sub-abas (bolinhas) ─────────────────────────── */
    .cat-sub-bar {
      display: flex;
      gap: .4rem;
      margin: .6rem 0 .55rem;
      flex-wrap: wrap;
      align-items: center;
    }
    .cat-sub-btn {
      display: inline-flex;
      align-items: center;
      gap: .35rem;
      padding: .2rem .78rem;
      border-radius: 999px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      color: var(--text-muted);
      font-family: inherit;
      font-size: .74rem;
      font-weight: 600;
      cursor: pointer;
      transition: border-color .16s cubic-bezier(.25,.46,.45,.94),
                  color .16s cubic-bezier(.25,.46,.45,.94),
                  background .16s cubic-bezier(.25,.46,.45,.94),
                  box-shadow .16s cubic-bezier(.25,.46,.45,.94),
                  transform .16s cubic-bezier(.25,.46,.45,.94);
      letter-spacing: .02em;
    }
    .cat-sub-btn:hover {
      border-color: var(--gold);
      color: var(--gold-dark);
      transform: translateY(-1px);
      box-shadow: 0 2px 5px rgba(156,88,67,.12);
    }
    .cat-sub-btn:active { transform: translateY(0); }
    .cat-sub-btn.ativo {
      background: var(--gold);
      border-color: var(--gold);
      color: #F5EFE2;
      box-shadow: 0 2px 6px rgba(156,88,67,.22);
    }
    .cat-sub-btn.ativo .tab-badge { background: rgba(32,44,40,.18); color: #F5EFE2; }
    .cat-sub-btn:not(.ativo) .tab-badge { background: var(--border); color: var(--text-secondary); }

    /* ── Botões de ação nas tabelas ─────────────────────── */
    .btn-acao-editar {
      background: #202C28;
      border: 1.5px solid #202C28;
      color: #F5EFE2;
      text-transform: none;
      letter-spacing: .02em;
      font-weight: 500;
      box-shadow: 0 1px 3px rgba(32,44,40,.2);
      transition: all .2s cubic-bezier(.25,.46,.45,.94);
    }
    .btn-acao-editar:hover {
      background: #2d3d38;
      border-color: #2d3d38;
      transform: translateY(-1px);
      box-shadow: 0 3px 8px rgba(32,44,40,.28);
    }
    .btn-acao-excluir {
      background: #9C5843;
      border: 1.5px solid #9C5843;
      color: #ECE4D2;
      box-shadow: 0 1px 2px rgba(156,88,67,.28);
      transition: all .2s cubic-bezier(.25,.46,.45,.94);
      text-transform: uppercase;
      letter-spacing: .05em;
    }
    .btn-acao-excluir:hover {
      background: #7a4234;
      border-color: #7a4234;
      transform: translateY(-1px);
      box-shadow: 0 3px 6px rgba(156,88,67,.35);
    }
    .btn-acao-editar:active, .btn-acao-excluir:active { transform: translateY(0); box-shadow: none; }
    .cfgti-field-err {
      display: block;
      font-size: .69rem;
      color: #9C5843;
      margin-top: .28rem;
      font-weight: 600;
      padding-left: .1rem;
    }
    #conf-overlay .modal-header { border-top: 1px solid var(--border); }
  </style>
</head>
<body>
<header>
  <a class="header-brand" href="https://hub-granmarquise.fly.dev" target="_blank" rel="noopener noreferrer" title="Abrir o Hub em nova aba" style="text-decoration:none;color:inherit;cursor:pointer">
    <img class="header-logo-img" src="https://letsimage.s3.amazonaws.com/editor/granmarquise/imgs/1760033174793-hotelgranmarquise_pos_footer.png" alt="Gran Marquise">
    <div class="header-brand-text">
      <div class="header-brand-name">Gran Marquise</div>
      <div class="header-brand-sub">Suporte de TI</div>
    </div>
  </a>
  <div class="header-divider"></div>
  <nav></nav>
</header>

<div id="toast-container"></div>

<main class="wide">
  <div class="page-header flex-between flex-wrap gap-2">
    <div>
      <div class="page-title">Inventário do Hotel</div>
      <div class="page-subtitle">Controle de estoque e inventário para agilizar a resolução de chamados</div>
    </div>
    <button class="btn btn-primary" id="btn-novo-item">+ Novo Item</button>
  </div>

  <!-- Categorias principais -->
  <div class="cat-bar">
    <button class="cat-btn ativo" data-cat="infraestrutura">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
      Ativos de Infraestrutura
      <span class="tab-badge" id="badge-infraestrutura"></span>
    </button>
    <button class="cat-btn" data-cat="insumos">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
      Insumos e Estoque
      <span class="tab-badge" id="badge-insumos"></span>
    </button>
    <button class="cat-btn" data-cat="configuracoes">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      Configurações da TI
    </button>
  </div>

  <!-- Sub-abas: Ativos de Infraestrutura (bolinhas) -->
  <div id="sub-infraestrutura" class="cat-sub-bar">
    <button class="cat-sub-btn ativo" data-tab="micros">
      Inventário de Micros <span class="tab-badge" id="badge-micros"></span>
    </button>
    <button class="cat-sub-btn" data-tab="reserva">
      Equipamentos <span class="tab-badge" id="badge-reserva"></span>
    </button>
    <button class="cat-sub-btn" data-tab="impressoras">
      Impressoras na Rede <span class="tab-badge" id="badge-impressoras"></span>
    </button>
  </div>

  <!-- Sub-abas: Insumos (carrega suprimentos direto, sem bolinhas) -->
  <div id="sub-insumos" class="cat-sub-bar" style="display:none"></div>

  <!-- Configurações: placeholder -->
  <div id="sub-configuracoes" class="cat-sub-bar" style="display:none"></div>

  <!-- Filtros equipamentos (visível só na aba Equipamentos) -->
  <div id="filtros-equipamentos" style="display:none;margin:.75rem 0 0">
    <div class="filtros">
      <div class="lupa-wrap" style="max-width:320px">
        <svg class="lupa-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input class="form-control" type="search" id="eq-busca" placeholder="Buscar por nome, categoria ou código…">
      </div>
      <select class="form-control" id="eq-status" style="max-width:160px">
        <option value="">Todos os status</option>
        <option value="disponivel">Disponível</option>
        <option value="em_uso">Em uso</option>
        <option value="manutencao">Manutenção</option>
        <option value="descartado">Descartado</option>
      </select>
      <button class="btn btn-primary btn-sm" id="btn-buscar-eq">Buscar</button>
      <button class="btn btn-secondary btn-sm" id="btn-limpar-eq">Limpar</button>
    </div>
  </div>

  <div id="itens-lista"><div class="loading"><div class="spinner"></div></div></div>
</main>

<!-- Modal de itens (estoque/inventario) -->
<div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-title">Novo Item</h2>
      <button class="modal-close" id="btn-fechar-modal" aria-label="Fechar">&#x2715;</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<!-- Modal de chamado (Chamados de Compra) -->
<div class="modal-overlay" id="cm-modal-overlay" role="dialog" aria-modal="true" aria-labelledby="cm-modal-title">
  <div class="modal">
    <div class="modal-header">
      <h2 id="cm-modal-title">Chamado</h2>
      <button class="modal-close" id="cm-btn-fechar-modal" aria-label="Fechar">&#x2715;</button>
    </div>
    <div class="modal-body" id="cm-modal-body"></div>
  </div>
</div>

<!-- Modal Inventário de Micros (adicionar/editar equipamento) -->
<div class="modal-overlay" id="micros-modal-overlay" role="dialog" aria-modal="true">
  <div class="modal" style="max-width:680px">
    <div class="modal-header">
      <h2 id="micros-modal-title">Adicionar Equipamento</h2>
      <button class="modal-close" id="micros-btn-fechar" aria-label="Fechar">&#x2715;</button>
    </div>
    <div class="modal-body" id="micros-modal-body"></div>
  </div>
</div>

<!-- Modal Movimentação de estoque TI (entrada/saída) -->
<div class="modal-overlay" id="mov-modal-overlay" role="dialog" aria-modal="true">
  <div class="modal" style="max-width:420px">
    <div class="modal-header">
      <h2 id="mov-modal-title">Movimentação</h2>
      <button class="modal-close" id="mov-btn-fechar" aria-label="Fechar">&#x2715;</button>
    </div>
    <div class="modal-body" id="mov-modal-body"></div>
  </div>
</div>

<!-- Modal Histórico de movimentações -->
<div class="modal-overlay" id="hist-mov-modal-overlay" role="dialog" aria-modal="true">
  <div class="modal" style="max-width:580px">
    <div class="modal-header">
      <h2 id="hist-mov-modal-title">Histórico</h2>
      <button class="modal-close" id="hist-mov-btn-fechar" aria-label="Fechar">&#x2715;</button>
    </div>
    <div class="modal-body" id="hist-mov-modal-body"></div>
  </div>
</div>

<!-- Modal Impressoras (adicionar/editar) -->
<div class="modal-overlay" id="imp-modal-overlay" role="dialog" aria-modal="true">
  <div class="modal" style="max-width:520px">
    <div class="modal-header">
      <h2 id="imp-modal-title">Impressora</h2>
      <button class="modal-close" id="imp-btn-fechar" aria-label="Fechar">&#x2715;</button>
    </div>
    <div class="modal-body" id="imp-modal-body"></div>
  </div>
</div>

<!-- Modal movimentação equipamento -->
<div class="modal-overlay" id="eq-mov-overlay" role="dialog" aria-modal="true">
  <div class="modal" style="max-width:480px">
    <div class="modal-header">
      <h2 id="eq-mov-title">Movimentação</h2>
      <button class="modal-close" id="eq-mov-fechar" aria-label="Fechar">&#x2715;</button>
    </div>
    <div class="modal-body" id="eq-mov-body"></div>
  </div>
</div>

<!-- Modal histórico / unidades equipamento -->
<div class="modal-overlay" id="eq-hist-overlay" role="dialog" aria-modal="true">
  <div class="modal" style="max-width:740px">
    <div class="modal-header">
      <h2 id="eq-hist-title">Unidades</h2>
      <button class="modal-close" id="eq-hist-fechar" aria-label="Fechar">&#x2715;</button>
    </div>
    <div class="modal-body" id="eq-hist-body"></div>
  </div>
</div>

<!-- Modal de confirmação de exclusão -->
<div class="modal-overlay" id="conf-overlay" role="dialog" aria-modal="true" style="display:none">
  <div class="modal" style="max-width:420px">
    <div class="modal-header">
      <h2 style="display:flex;align-items:center;gap:.5rem">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#9C5843" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
        Confirmar exclusão
      </h2>
      <button class="modal-close" id="conf-close" aria-label="Fechar">&#x2715;</button>
    </div>
    <div class="modal-body" style="padding:1.1rem 1.25rem">
      <p id="conf-msg" style="margin:0;color:var(--text-secondary);font-size:.92rem;line-height:1.55"></p>
    </div>
    <div style="display:flex;gap:.6rem;justify-content:flex-end;padding:.9rem 1.25rem;border-top:1px solid var(--border)">
      <button class="btn btn-secondary" id="conf-cancel">Cancelar</button>
      <button class="btn btn-acao-excluir" id="conf-ok">Excluir</button>
    </div>
  </div>
</div>

<datalist id="dl-setores"></datalist>
<datalist id="dl-usuarios"></datalist>
<datalist id="dl-cfg-equipamento"></datalist>
<datalist id="dl-cfg-processador"></datalist>
<datalist id="dl-cfg-nobreak"></datalist>
<datalist id="dl-cfg-memoria"></datalist>
<datalist id="dl-cfg-so"></datalist>
<datalist id="dl-cfg-hd_ssd"></datalist>
<datalist id="dl-cfg-office"></datalist>
<datalist id="dl-cfg-entradas_monitor"></datalist>
<datalist id="dl-cfg-modelo_monitor"></datalist>
<datalist id="dl-cfg-hostname"></datalist>

<script src="/js/nav.js?v=10"></script>
<script src="/js/historico-modal.js?v=10"></script>
<script src="/js/chamado-modal.js?v=10"></script>
<script src="/js/admin-itens.js?v=12"></script>
</body>
</html>
