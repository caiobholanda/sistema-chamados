<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Itens — Gran Marquise TI</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<header>
  <div class="header-brand">
    <img class="header-logo-img" src="https://letsimage.s3.amazonaws.com/editor/granmarquise/imgs/1760033174793-hotelgranmarquise_pos_footer.png" alt="Gran Marquise">
    <div class="header-brand-text">
      <div class="header-brand-name">Gran Marquise</div>
      <div class="header-brand-sub">Suporte de TI</div>
    </div>
  </div>
  <div class="header-divider"></div>
  <nav></nav>
</header>

<div id="toast-container"></div>

<main class="wide">
  <div class="page-header flex-between flex-wrap gap-2">
    <div>
      <div class="page-title">Itens do Hotel</div>
      <div class="page-subtitle">Controle de estoque e inventário para agilizar a resolução de chamados</div>
    </div>
    <button class="btn btn-primary" id="btn-novo-item">+ Novo Item</button>
  </div>

  <div class="tabs-bar">
    <button class="tab-btn ativo" data-tab="micros">
      Inventário de Micros <span class="tab-badge" id="badge-micros"></span>
    </button>
    <button class="tab-btn" data-tab="perifericos">
      Suprimentos <span class="tab-badge" id="badge-perifericos"></span>
    </button>
    <button class="tab-btn" data-tab="reserva">
      Equipamentos <span class="tab-badge" id="badge-reserva"></span>
    </button>
    <button class="tab-btn" data-tab="impressoras">
      Impressoras na Rede <span class="tab-badge" id="badge-impressoras"></span>
    </button>
    <button class="tab-btn" data-tab="toner">
      Toner/Cartucho <span class="tab-badge" id="badge-toner"></span>
    </button>
    <button class="tab-btn" data-tab="compra">
      Chamados de Compra <span class="tab-badge" id="badge-compra"></span>
    </button>
  </div>

  <div id="itens-lista"><div class="loading"><div class="spinner"></div></div></div>
</main>

<!-- Modal de itens (estoque/inventario) -->
<div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-title">Novo Item</h2>
      <button class="modal-close" id="btn-fechar-modal" aria-label="Fechar">&#x2715;</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<!-- Modal de chamado (Chamados de Compra) -->
<div class="modal-overlay" id="cm-modal-overlay" role="dialog" aria-modal="true" aria-labelledby="cm-modal-title">
  <div class="modal">
    <div class="modal-header">
      <h2 id="cm-modal-title">Chamado</h2>
      <button class="modal-close" id="cm-btn-fechar-modal" aria-label="Fechar">&#x2715;</button>
    </div>
    <div class="modal-body" id="cm-modal-body"></div>
  </div>
</div>

<!-- Modal Inventário de Micros (adicionar/editar equipamento) -->
<div class="modal-overlay" id="micros-modal-overlay" role="dialog" aria-modal="true">
  <div class="modal" style="max-width:680px">
    <div class="modal-header">
      <h2 id="micros-modal-title">Adicionar Equipamento</h2>
      <button class="modal-close" id="micros-btn-fechar" aria-label="Fechar">&#x2715;</button>
    </div>
    <div class="modal-body" id="micros-modal-body"></div>
  </div>
</div>

<!-- Modal Movimentação de estoque TI (entrada/saída) -->
<div class="modal-overlay" id="mov-modal-overlay" role="dialog" aria-modal="true">
  <div class="modal" style="max-width:420px">
    <div class="modal-header">
      <h2 id="mov-modal-title">Movimentação</h2>
      <button class="modal-close" id="mov-btn-fechar" aria-label="Fechar">&#x2715;</button>
    </div>
    <div class="modal-body" id="mov-modal-body"></div>
  </div>
</div>

<!-- Modal Histórico de movimentações -->
<div class="modal-overlay" id="hist-mov-modal-overlay" role="dialog" aria-modal="true">
  <div class="modal" style="max-width:580px">
    <div class="modal-header">
      <h2 id="hist-mov-modal-title">Histórico</h2>
      <button class="modal-close" id="hist-mov-btn-fechar" aria-label="Fechar">&#x2715;</button>
    </div>
    <div class="modal-body" id="hist-mov-modal-body"></div>
  </div>
</div>

<!-- Modal Impressoras (adicionar/editar) -->
<div class="modal-overlay" id="imp-modal-overlay" role="dialog" aria-modal="true">
  <div class="modal" style="max-width:520px">
    <div class="modal-header">
      <h2 id="imp-modal-title">Impressora</h2>
      <button class="modal-close" id="imp-btn-fechar" aria-label="Fechar">&#x2715;</button>
    </div>
    <div class="modal-body" id="imp-modal-body"></div>
  </div>
</div>

<script src="/js/nav.js"></script>
<script src="/js/historico-modal.js"></script>
<script src="/js/chamado-modal.js"></script>
<script src="/js/admin-itens.js"></script>
</body>
</html>
