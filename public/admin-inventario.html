<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventário — Gran Marquise TI</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<header>
  <a class="header-brand" href="https://hub-granmarquise.fly.dev" target="_blank" rel="noopener noreferrer" title="Abrir o Hub em nova aba" style="text-decoration:none;color:inherit;cursor:pointer">
    <img class="header-logo-img" src="https://letsimage.s3.amazonaws.com/editor/granmarquise/imgs/1760033174793-hotelgranmarquise_pos_footer.png" alt="Gran Marquise">
    <div class="header-brand-text">
      <div class="header-brand-name">Gran Marquise</div>
      <div class="header-brand-sub">Suporte de TI</div>
    </div>
  </a>
  <div class="header-divider"></div>
  <nav></nav>
</header>

<div id="toast-container"></div>

<main class="wide">
  <div class="page-header flex-between flex-wrap gap-2">
    <div>
      <div class="page-title">Inventário de Micros</div>
      <div class="page-subtitle">Relação de computadores, monitores e equipamentos por setor</div>
    </div>
    <button class="btn btn-primary" id="btn-novo-equip">+ Adicionar Equipamento</button>
  </div>

  <div class="filter-bar" style="display:flex;gap:.75rem;flex-wrap:wrap;align-items:center;margin-bottom:1rem">
    <div class="lupa-wrap" style="max-width:200px">
      <svg class="lupa-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="form-control" id="f-setor" type="text" placeholder="Filtrar por setor…">
    </div>
    <select class="form-control" id="f-status" style="max-width:160px">
      <option value="">Todos os status</option>
      <option value="NOVO">NOVO</option>
    </select>
    <div class="lupa-wrap" style="max-width:220px">
      <svg class="lupa-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="form-control" id="f-search" type="text" placeholder="Buscar usuário, hostname…">
    </div>
    <span id="inv-count" style="color:var(--text-muted);font-size:.82rem;margin-left:.25rem"></span>
  </div>

  <div id="inv-lista"><div class="loading"><div class="spinner"></div></div></div>
</main>

<!-- Modal Adicionar/Editar -->
<div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true">
  <div class="modal" style="max-width:680px">
    <div class="modal-header">
      <h2 id="modal-title">Adicionar Equipamento</h2>
      <button class="modal-close" id="btn-fechar-modal" aria-label="Fechar">&#x2715;</button>
    </div>
    <div class="modal-body" id="modal-body" style="padding:1.25rem 1.5rem"></div>
  </div>
</div>

<script src="/js/nav.js?v=10"></script>
<script src="/js/admin-inventario.js?v=11"></script>
</body>
</html>
