<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redefinir senha — Gran Marquise TI</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body class="auth-mode">
<main style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;background:var(--bg)">
  <div class="login-card" style="max-width:420px;width:100%">
    <div style="text-align:center;margin-bottom:1.5rem">
      <img src="https://letsimage.s3.amazonaws.com/editor/granmarquise/imgs/1760033174793-hotelgranmarquise_pos_footer.png"
           alt="Gran Marquise" style="height:36px;filter:brightness(0);opacity:.6;margin-bottom:.75rem">
      <div class="login-card-title">Redefinir senha</div>
      <div class="login-card-sub">Crie uma nova senha para sua conta</div>
    </div>

    <div id="msg-reset"></div>

    <form id="form-reset" novalidate>
      <div class="form-group">
        <label for="nova-senha">Nova senha</label>
        <div class="input-senha-wrap">
          <input class="form-control" type="password" id="nova-senha" placeholder="••••••••" autocomplete="new-password">
          <button type="button" class="btn-eye" id="btn-eye-nova" title="Mostrar/ocultar senha">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <div class="senha-forca" id="forca-wrap" style="margin-top:.5rem">
          <div class="senha-barra"><div class="senha-barra-fill" id="barra-forca"></div></div>
          <ul class="senha-reqs" id="reqs-lista">
            <li data-req="len">Mínimo 8 caracteres</li>
            <li data-req="upper">Letra maiúscula (A-Z)</li>
            <li data-req="lower">Letra minúscula (a-z)</li>
            <li data-req="digit">Número (0-9)</li>
            <li data-req="special">Caractere especial (!@#$…)</li>
          </ul>
        </div>
      </div>

      <div class="form-group">
        <label for="conf-senha">Confirmar senha</label>
        <div class="input-senha-wrap">
          <input class="form-control" type="password" id="conf-senha" placeholder="••••••••" autocomplete="new-password">
          <button type="button" class="btn-eye" id="btn-eye-conf" title="Mostrar/ocultar senha">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <p id="msg-conf" style="font-size:.78rem;color:var(--danger);margin:.3rem 0 0;display:none">As senhas não coincidem.</p>
      </div>

      <button type="submit" class="btn btn-primary btn-full" id="btn-redefinir" disabled>Redefinir senha</button>
    </form>

    <div style="text-align:center;margin-top:1rem">
      <a href="/" style="font-size:.8rem;color:var(--text-muted)">Voltar ao login</a>
    </div>
  </div>
</main>
<script src="/js/redefinir-senha.js"></script>
</body>
</html>
