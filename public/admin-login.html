<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acesso Administrativo — Gran Marquise TI</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="login-page">

  <div class="login-left">
    <img src="https://letsimage.s3.amazonaws.com/editor/granmarquise/imgs/1760033174793-hotelgranmarquise_pos_footer.png"
         alt="Gran Marquise"
         style="width:170px;margin-bottom:2rem;position:relative;z-index:1;filter:brightness(0) invert(1)">
    <div class="login-badge">Acesso Restrito</div>
    <h2>Portal de Administração de TI</h2>
    <p>Acesso exclusivo para administradores do setor de Tecnologia da Informação do Hotel Gran Marquise.</p>
  </div>

  <div class="login-right">
    <div class="login-card">
      <div class="login-card-title">Entrar no painel</div>
      <div class="login-card-sub">Utilize suas credenciais de administrador</div>

      <div id="msg"></div>

      <form id="form-login" novalidate>
        <div class="form-group">
          <label for="usuario">Usuário</label>
          <input class="form-control" type="text" id="usuario" name="usuario" required autocomplete="username" placeholder="seu.usuario">
        </div>
        <div class="form-group">
          <label for="senha">Senha</label>
          <input class="form-control" type="password" id="senha" name="senha" required autocomplete="current-password" placeholder="••••••••">
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="btn-login" style="margin-top:.5rem">Entrar</button>
      </form>

      <div style="text-align:center;margin-top:1.5rem">
        <a href="/" style="font-size:.78rem;color:var(--text-muted);text-decoration:none;letter-spacing:.04em">Voltar ao portal</a>
      </div>
    </div>
  </div>

</div>
<script src="/js/admin-login.js"></script>
</body>
</html>
