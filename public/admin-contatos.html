<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contatos — Gran Marquise TI</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .pessoa-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr auto;
      gap: .5rem;
      align-items: end;
      margin-bottom: .5rem;
    }
    .pessoa-row .btn-remover-pessoa {
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--danger);
      cursor: pointer;
      padding: .42rem .6rem;
      font-size: .9rem;
      line-height: 1;
      transition: background .15s;
    }
    .pessoa-row .btn-remover-pessoa:hover { background: var(--danger-light); }
    #pessoas-container .label-pessoas {
      font-size: .72rem;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: .4rem;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr auto;
      gap: .5rem;
      padding-right: .1rem;
    }
    .contato-card-header {
      background: var(--navy);
      padding: .65rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }
    .contato-card-meta {
      display: flex;
      flex-wrap: wrap;
      gap: .5rem 1.5rem;
      padding: .65rem 1rem;
      border-bottom: 1px solid var(--border);
      font-size: .8rem;
      color: var(--text-secondary);
    }
    .contato-card-meta a { color: var(--text-secondary); text-decoration: none; }
    .contato-card-meta a:hover { color: var(--text); text-decoration: underline; }
    .contato-card-meta .meta-item { display: flex; align-items: center; gap: .35rem; }
    .contato-card-pessoas { padding: 0; }
    .pessoa-linha {
      display: grid;
      grid-template-columns: 1.2fr 1.2fr 1fr auto;
      gap: 0;
      border-bottom: 1px solid var(--border);
      font-size: .82rem;
    }
    .pessoa-linha:last-child { border-bottom: none; }
    .pessoa-linha > * { padding: .55rem 1rem; }
    .pessoa-linha .p-acoes {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: .25rem;
      padding-right: .75rem;
    }
    .pessoas-header {
      display: grid;
      grid-template-columns: 1.2fr 1.2fr 1fr auto;
      font-size: .68rem;
      font-weight: 600;
      letter-spacing: .07em;
      text-transform: uppercase;
      color: var(--text-muted);
      background: var(--surface-2);
      border-bottom: 1px solid var(--border);
    }
    .pessoas-header > * { padding: .4rem 1rem; }
  </style>
</head>
<body>
<header>
  <div class="header-brand">
    <img class="header-logo-img" src="https://letsimage.s3.amazonaws.com/editor/granmarquise/imgs/1760033174793-hotelgranmarquise_pos_footer.png" alt="Gran Marquise">
    <div class="header-brand-text">
      <div class="header-brand-name">Gran Marquise</div>
      <div class="header-brand-sub">Suporte de TI</div>
    </div>
  </div>
  <div class="header-divider"></div>
  <nav></nav>
</header>

<div id="toast-container"></div>

<main class="wide">
  <div class="page-header flex-between flex-wrap gap-2">
    <div>
      <div class="page-title">Contatos do Hotel</div>
      <div class="page-subtitle">Empresas, áreas e responsáveis por setor</div>
    </div>
    <button class="btn btn-primary" id="btn-novo-contato">+ Novo Contato</button>
  </div>

  <div class="filtros" style="margin-bottom:1rem">
    <input class="form-control" type="search" id="busca-contatos" placeholder="Buscar por empresa, nome ou responsabilidade…" style="max-width:380px">
  </div>

  <div id="lista-contatos"></div>
</main>

<!-- Modal Contato -->
<div class="modal-overlay" id="modal-contato-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-contato-title">
  <div class="modal" style="max-width:680px">
    <div class="modal-header">
      <h2 id="modal-contato-title">Novo Contato</h2>
      <button class="modal-close" id="btn-fechar-contato" aria-label="Fechar">&#x2715;</button>
    </div>
    <div class="modal-body">
      <div id="msg-modal-contato"></div>
      <form id="form-contato" novalidate>
        <input type="hidden" id="contato-id">

        <div class="form-group">
          <label for="fc-area">Empresa / Área <span class="text-muted" style="font-size:.72rem;font-weight:400;text-transform:none;letter-spacing:0">(opcional)</span></label>
          <input class="form-control" type="text" id="fc-area" list="areas-datalist" placeholder="Ex: Cellbet, Recepção, Restaurante…" maxlength="80" autocomplete="off">
          <datalist id="areas-datalist"></datalist>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:.75rem">
          <div class="form-group" style="margin-bottom:0">
            <label for="fc-wpp">WhatsApp <span class="text-muted" style="font-size:.72rem;font-weight:400;text-transform:none;letter-spacing:0">(opcional)</span></label>
            <input class="form-control" type="tel" id="fc-wpp" placeholder="(85) 9 0000-0000" maxlength="20" inputmode="tel">
          </div>
          <div class="form-group" style="margin-bottom:0">
            <label for="fc-fixo">Telefone Fixo <span class="text-muted" style="font-size:.72rem;font-weight:400;text-transform:none;letter-spacing:0">(opcional)</span></label>
            <input class="form-control" type="tel" id="fc-fixo" placeholder="(85) 0000-0000" maxlength="20" inputmode="tel">
          </div>
          <div class="form-group" style="margin-bottom:0">
            <label for="fc-email">E-mail <span class="text-muted" style="font-size:.72rem;font-weight:400;text-transform:none;letter-spacing:0">(opcional)</span></label>
            <input class="form-control" type="email" id="fc-email" placeholder="contato@empresa.com" maxlength="120" autocomplete="off">
          </div>
        </div>

        <!-- Pessoas -->
        <div style="margin-top:1.25rem;border-top:1px solid var(--border);padding-top:1rem">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:.6rem">
            <span style="font-size:.78rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text-secondary)">Pessoas</span>
            <button type="button" class="btn btn-ghost btn-sm" id="btn-add-pessoa" style="font-size:.75rem">+ Adicionar pessoa</button>
          </div>
          <div id="pessoas-container"></div>
          <p id="pessoas-vazio" style="font-size:.82rem;color:var(--text-muted);text-align:center;padding:.75rem 0">Nenhuma pessoa adicionada. Clique em "+ Adicionar pessoa".</p>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button type="button" class="btn btn-secondary" id="btn-cancelar-contato">Cancelar</button>
      <button type="submit" form="form-contato" class="btn btn-primary" id="btn-salvar-contato">Salvar</button>
    </div>
  </div>
</div>

<!-- Modal Confirmar Exclusão -->
<div class="modal-overlay" id="modal-excluir-overlay" role="dialog" aria-modal="true">
  <div class="modal" style="max-width:400px">
    <div class="modal-header">
      <h2>Excluir contato</h2>
      <button class="modal-close" id="btn-fechar-excluir" aria-label="Fechar">&#x2715;</button>
    </div>
    <div class="modal-body">
      <p id="excluir-msg" style="margin:0;font-size:.95rem;line-height:1.6;color:var(--text)"></p>
    </div>
    <div class="modal-footer">
      <button type="button" class="btn btn-secondary" id="btn-cancelar-excluir">Cancelar</button>
      <button type="button" class="btn btn-danger" id="btn-ok-excluir">Excluir</button>
    </div>
  </div>
</div>

<script src="/js/nav.js"></script>
<script src="/js/admin-contatos.js"></script>
</body>
</html>
