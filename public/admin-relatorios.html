<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Relatórios — Gran Marquise TI</title>
  <link rel="preconnect" href="https://letsimage.s3.amazonaws.com">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<header>
  <div class="header-brand">
    <img class="header-logo-img" src="https://letsimage.s3.amazonaws.com/editor/granmarquise/imgs/1760033174793-hotelgranmarquise_pos_footer.png" alt="Gran Marquise">
    <div class="header-brand-text">
      <div class="header-brand-name">Gran Marquise</div>
      <div class="header-brand-sub">Suporte de TI</div>
    </div>
  </div>
  <div class="header-divider"></div>
  <nav></nav>
</header>

<main class="wide">

  <div class="page-header">
    <div class="page-title">Relatórios</div>
    <div class="page-subtitle" id="page-subtitle">Indicadores de desempenho do suporte de TI</div>
  </div>

  <div class="rel-toolbar">
    <button class="step-arrow" id="btn-mes-anterior" aria-label="Mês anterior" title="Mês anterior">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <label class="picker" for="sel-mes">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      <span id="label-mes">—</span>
      <input type="month" id="sel-mes" style="position:absolute;opacity:0;width:0;height:0;pointer-events:none">
    </label>
    <button class="step-arrow" id="btn-mes-proximo" aria-label="Próximo mês" title="Próximo mês">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
    <button class="btn btn-secondary btn-sm" id="btn-mes-atual" style="font-size:.7rem">Mês atual</button>
    <div class="compare" id="compare-info" style="display:none">
      Comparar vs. <strong id="compare-mes">—</strong>
    </div>
  </div>

  <div id="conteudo"><div class="loading"><div class="spinner"></div></div></div>
</main>

<script defer src="/js/nav.js"></script>
<script defer src="/js/admin-relatorios.js?v=3"></script>
</body>
</html>
