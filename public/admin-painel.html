<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chamados — Gran Marquise TI</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<header>
  <div class="header-brand">
    <img class="header-logo-img" src="https://letsimage.s3.amazonaws.com/editor/granmarquise/imgs/1760033174793-hotelgranmarquise_pos_footer.png" alt="Gran Marquise">
    <div class="header-brand-text">
      <div class="header-brand-name">Gran Marquise</div>
      <div class="header-brand-sub">Suporte de TI</div>
    </div>
  </div>
  <div class="header-divider"></div>
  <nav>
    <a href="/admin-painel.html" class="ativo">Chamados</a>
    <span id="nav-usuarios-wrap"></span>
    <a href="/admin-relatorios.html">Relatórios</a>
    <a href="/admin-itens.html">Itens</a>
    <button id="btn-notificacoes" class="btn btn-ghost btn-sm" title="Ativar notificações" style="margin-left:.5rem;font-size:1rem;padding:.3rem .5rem">🔔</button>
    <button id="btn-logout" class="btn btn-ghost btn-sm" style="margin-left:.25rem">Sair</button>
  </nav>
</header>

<div id="toast-container"></div>
<main class="wide">
  <div id="msg-global"></div>

  <div class="page-header">
    <div class="page-title">Gestão de Chamados</div>
    <div class="page-subtitle">Acompanhe e gerencie todos os chamados de TI do hotel</div>
  </div>

  <div class="stats-strip" id="stats-strip">
    <div class="stat-pill">
      <div class="stat-dot dot-aberto">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <rect x="8" y="2" width="8" height="4" rx="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M9 12h6M9 16h4"/>
        </svg>
      </div>
      <div class="stat-info">
        <div class="stat-num" id="cnt-aberto">—</div>
        <div class="stat-label">Abertos</div>
      </div>
    </div>
    <div class="stat-pill">
      <div class="stat-dot dot-andamento">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </div>
      <div class="stat-info">
        <div class="stat-num" id="cnt-andamento">—</div>
        <div class="stat-label">Em andamento</div>
      </div>
    </div>
    <div class="stat-pill">
      <div class="stat-dot dot-concluido">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
      <div class="stat-info">
        <div class="stat-num" id="cnt-concluido">—</div>
        <div class="stat-label">Concluídos</div>
      </div>
    </div>
  </div>

  <div class="equipamentos-widget" id="equipamentos-widget" style="display:none">
    <div class="equipamentos-header">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
      <span>Equipamentos mais problemáticos</span>
      <span class="equipamentos-badge-ia">IA</span>
    </div>
    <div class="equipamentos-lista" id="equipamentos-lista"></div>
  </div>

  <div class="tabs-bar">
    <button class="tab-btn ativo" id="tab-abertos" data-tab="abertos">
      Em Aberto <span class="tab-badge" id="badge-abertos"></span>
    </button>
    <button class="tab-btn" id="tab-encerrados" data-tab="encerrados">
      Concluídos <span class="tab-badge" id="badge-encerrados"></span>
    </button>
    <button class="tab-btn" id="tab-meus" data-tab="meus" style="margin-left:auto">
      Meus chamados <span class="tab-badge" id="badge-meus"></span>
    </button>
  </div>

  <div class="sub-tabs-bar" id="subtabs-meus" style="display:none;margin:1rem 0 0">
    <button class="sub-tab-btn ativo" id="subtab-meus-abertos" data-subtab="abertos">
      Abertos <span class="tab-badge" id="badge-meus-abertos"></span>
    </button>
    <button class="sub-tab-btn" id="subtab-meus-encerrados" data-subtab="encerrados">
      Concluídos <span class="tab-badge" id="badge-meus-encerrados"></span>
    </button>
  </div>

  <div class="filtros-card">
    <div class="filtros">
      <select class="form-control" id="filtro-status" aria-label="Status"></select>
      <select class="form-control" id="filtro-setor" aria-label="Setor">
        <option value="">Todos os setores</option>
        <optgroup label="Hospedagem">
          <option>Recepção</option>
          <option>Concierge</option>
          <option>Governança</option>
          <option>Reservas</option>
          <option>Mensageria / Portaria</option>
        </optgroup>
        <optgroup label="Alimentos &amp; Bebidas">
          <option>Restaurante Mucuripe</option>
          <option>Restaurante Mangostin</option>
          <option>Bar Rooftop</option>
          <option>Lobby Bar</option>
          <option>Room Service</option>
          <option>Cozinha</option>
          <option>Confeitaria / Padaria</option>
          <option>Nutrição</option>
          <option>Banquetes</option>
        </optgroup>
        <optgroup label="Eventos">
          <option>Eventos e Convenções</option>
        </optgroup>
        <optgroup label="Bem-estar &amp; Lazer">
          <option>Spa by L'Occitane</option>
          <option>Fitness Center</option>
          <option>Piscina</option>
          <option>Play Gran</option>
        </optgroup>
        <optgroup label="Administrativo">
          <option>Gerência Geral</option>
          <option>Recursos Humanos</option>
          <option>Financeiro</option>
          <option>Controladoria</option>
          <option>Compras / Almoxarifado</option>
          <option>Comercial / Vendas</option>
          <option>Marketing</option>
          <option>Revenue Management</option>
          <option>Tecnologia da Informação</option>
          <option>Jurídico</option>
        </optgroup>
        <optgroup label="Operacional">
          <option>Manutenção</option>
          <option>Segurança</option>
          <option>Lavanderia</option>
          <option>Rouparia</option>
          <option>Estacionamento</option>
          <option>Transportes</option>
        </optgroup>
      </select>
      <select class="form-control" id="filtro-admin" aria-label="Responsável">
        <option value="">Todos os responsáveis</option>
      </select>
      <select class="form-control" id="filtro-prioridade" aria-label="Prioridade">
        <option value="">Todas as prioridades</option>
        <option value="urgente">🔴 Urgente</option>
        <option value="alta">🟠 Alta</option>
        <option value="media">🟡 Média</option>
        <option value="baixa">🟢 Baixa</option>
        <option value="sem">⚪ Sem prioridade</option>
      </select>
      <input class="form-control" type="date" id="filtro-inicio" aria-label="Data início">
      <input class="form-control" type="date" id="filtro-fim" aria-label="Data fim">
      <button class="btn btn-primary btn-sm" id="btn-filtrar">Filtrar</button>
      <button class="btn btn-secondary btn-sm" id="btn-limpar">Limpar</button>
      <button class="btn btn-secondary btn-sm" id="btn-atualizar" title="Atualizar" aria-label="Atualizar">&#8635;</button>
    </div>
  </div>

  <div id="lista-chamados"><div class="loading"><div class="spinner"></div></div></div>
</main>

<div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modal-title">Chamado</h2>
      <button class="modal-close" id="btn-fechar-modal" aria-label="Fechar">&#x2715;</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script src="/js/admin-painel.js?v=2"></script>
</body>
</html>
