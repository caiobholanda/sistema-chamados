<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acesso pelo Hub — Gran Marquise</title>
<link rel="preconnect" href="https://letsimage.s3.amazonaws.com">
<style>
  :root {
    --paper: #F7F3ED;
    --surface: #FFFFFF;
    --ink: #0D1B2A;
    --gold: #D4AF37;
    --gold-dark: #B8960C;
    --line: rgba(13,27,42,.10);
    --muted: #4A4540;
  }
  *,*::before,*::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--paper);
    color: var(--ink);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    padding: 2rem 1rem;
    -webkit-font-smoothing: antialiased;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: 14px;
    box-shadow: 0 30px 70px -25px rgba(13,27,42,.18), 0 2px 8px rgba(13,27,42,.04);
    max-width: 460px;
    width: 100%;
    padding: 3rem 2.5rem 2.5rem;
    text-align: center;
  }
  .logo {
    width: 168px;
    margin: 0 auto 1.75rem;
    display: block;
  }
  .gold-rule {
    width: 56px;
    height: 2px;
    background: var(--gold);
    margin: 0 auto 1.5rem;
    border-radius: 2px;
  }
  h1 {
    font-family: Georgia, 'Times New Roman', serif;
    font-weight: 400;
    font-size: 1.5rem;
    margin: 0 0 .65rem;
    color: var(--ink);
    letter-spacing: -.01em;
  }
  p.lead {
    color: var(--muted);
    font-size: .95rem;
    line-height: 1.6;
    margin: 0 0 1.75rem;
  }
  .badge-sistema {
    display: inline-block;
    font-family: 'JetBrains Mono', ui-monospace, monospace;
    font-size: .65rem;
    letter-spacing: .22em;
    text-transform: uppercase;
    color: var(--gold-dark);
    background: rgba(212,175,55,.10);
    padding: .35rem .75rem;
    border-radius: 999px;
    margin-bottom: 1.25rem;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: .6rem;
    background: var(--ink);
    color: var(--paper);
    border: none;
    border-radius: 8px;
    padding: .9rem 1.75rem;
    font-size: .95rem;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    transition: transform .15s ease, box-shadow .2s ease, background .2s ease;
    box-shadow: 0 6px 16px -4px rgba(13,27,42,.30);
  }
  .btn:hover { background: #152844; transform: translateY(-1px); box-shadow: 0 10px 22px -6px rgba(13,27,42,.36); }
  .btn:active { transform: translateY(0); }
  .btn svg { flex-shrink: 0; }
  .hint {
    margin-top: 1.5rem;
    font-size: .78rem;
    color: var(--muted);
    opacity: .75;
  }
  @media (max-width: 480px) {
    .card { padding: 2.25rem 1.5rem 2rem; }
    h1 { font-size: 1.3rem; }
  }
</style>
</head>
<body>
  <div class="card">
    <img class="logo" src="https://letsimage.s3.amazonaws.com/editor/granmarquise/imgs/1760033174793-hotelgranmarquise_pos_footer.png" alt="Gran Marquise">
    <div class="gold-rule"></div>
    <span class="badge-sistema">Chamados TI</span>
    <h1>Faça login pelo Hub</h1>
    <p class="lead">O acesso aos sistemas internos passou a ser centralizado no Hub Gran Marquise. Clique abaixo para entrar.</p>
    <a id="btn-hub" class="btn" href="#">
      Acessar via Hub
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
    </a>
    <div class="hint">hub-granmarquise.fly.dev</div>
  </div>
<script>
  (function () {
    var HUB = 'https://hub-granmarquise.fly.dev';
    var params = new URLSearchParams(location.search);
    var next = params.get('next') || (location.origin + '/admin-painel.html');
    var url = HUB + '/?next=' + encodeURIComponent(next);
    document.getElementById('btn-hub').href = url;
  })();
</script>
</body>
</html>
